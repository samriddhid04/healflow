# =============================================================================
# .github/workflows/ci-cd.yml
# HealFlow — Full DevSecOps CI/CD Pipeline
# US Healthcare SaaS Grade Security
#
# Pipeline Stages:
#   1. branch-check        → enforce branch naming policy
#   2. setup               → checkout + install all deps
#   3. lint                → ESLint on frontend + backend
#   4. security            → npm audit + dependency scan
#   5. env-check           → env structure + forbidden values
#   6. build               → vite frontend build
#   7. backend-check       → start server + health endpoint
#   8. api-integration     → /api/patients + response validation
#   9. ai-check            → AI suggestion engine
#  10. deployment-ready    → gate — only passes if all above pass
#  11. deploy-frontend     → Vercel (main/release/* only)
#  12. deploy-backend      → Railway (main/release/* only)
# =============================================================================

name: HealFlow — DevSecOps CI/CD

on:
  push:
    branches:
      - main
      - dev
      - develop
      - "release/**"
      - "hotfix/**"
      - "feature/**"
      - "fix/**"
      - "ci/**"
  pull_request:
    branches:
      - main
      - dev

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Global env ────────────────────────────────────────────────────────────────
env:
  NODE_VERSION: "20.x"
  BACKEND_PORT: 4000
  CI: true

# =============================================================================
# JOB 1: Branch Policy Check
# Blocks random / non-compliant branch names early
# =============================================================================
jobs:
  branch-check:
    name: "🔀 Branch Policy"
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.branch.outputs.can_deploy }}
      branch_name: ${{ steps.branch.outputs.branch_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Check branch policy
        id: branch
        run: bash scripts/branch-check.sh "${{ github.ref_name }}"

      - name: Annotate PR with branch info
        if: github.event_name == 'pull_request'
        run: |
          echo "### 🔀 Branch Check" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy eligible: \`${{ steps.branch.outputs.can_deploy }}\`" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# JOB 2: Setup & Install
# =============================================================================
  setup:
    name: "📦 Setup & Install"
    runs-on: ubuntu-latest
    needs: [branch-check]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --prefer-offline

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Verify installs
        run: |
          echo "### 📦 Dependencies Installed" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Version |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js | $(node --version) |" >> $GITHUB_STEP_SUMMARY
          echo "| npm     | $(npm --version)  |" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# JOB 3: Code Quality (Lint)
# =============================================================================
  lint:
    name: "🔍 Code Quality"
    runs-on: ubuntu-latest
    needs: [setup]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore backend cache
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}

      - name: Restore frontend cache
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Lint backend
        working-directory: backend
        run: |
          echo "Running ESLint on backend..."
          npx eslint . --ext .js --format stylish --max-warnings 10 \
            --ignore-pattern node_modules \
            --ignore-pattern data/store.js || {
              echo "::error::Backend linting failed"
              exit 1
            }

      - name: Lint frontend
        working-directory: frontend
        run: |
          echo "Running ESLint on frontend..."
          npx eslint src --ext .js,.jsx --format stylish --max-warnings 15 || {
            echo "::error::Frontend linting failed"
            exit 1
          }

      - name: Summary
        if: always()
        run: |
          echo "### 🔍 Lint Results" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# JOB 4: Security Checks
# HIPAA-grade: npm audit, dependency scan, vulnerability thresholds
# =============================================================================
  security:
    name: "🔐 Security Audit"
    runs-on: ubuntu-latest
    needs: [setup]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore backend cache
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}

      - name: Restore frontend cache
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: npm audit — backend (block on critical/high)
        working-directory: backend
        run: |
          echo "## Backend Security Audit" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high --json > /tmp/backend-audit.json 2>&1 || AUDIT_EXIT=$?
          CRITICAL=$(cat /tmp/backend-audit.json | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              v = d.get('metadata', {}).get('vulnerabilities', {})
              print(v.get('critical', 0))
          except: print(0)
          " 2>/dev/null || echo "0")
          HIGH=$(cat /tmp/backend-audit.json | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              v = d.get('metadata', {}).get('vulnerabilities', {})
              print(v.get('high', 0))
          except: print(0)
          " 2>/dev/null || echo "0")
          echo "| Level | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | ${CRITICAL} |" >> $GITHUB_STEP_SUMMARY
          echo "| High | ${HIGH} |" >> $GITHUB_STEP_SUMMARY
          if [ "$CRITICAL" -gt "0" ]; then
            echo "::error::Backend has ${CRITICAL} CRITICAL vulnerabilities. Pipeline blocked."
            exit 1
          fi
          if [ "$HIGH" -gt "0" ]; then
            echo "::warning::Backend has ${HIGH} HIGH vulnerabilities. Review required."
          fi

      - name: npm audit — frontend (block on critical/high)
        working-directory: frontend
        run: |
          echo "## Frontend Security Audit" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high --json > /tmp/frontend-audit.json 2>&1 || true
          CRITICAL=$(cat /tmp/frontend-audit.json | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              v = d.get('metadata', {}).get('vulnerabilities', {})
              print(v.get('critical', 0))
          except: print(0)
          " 2>/dev/null || echo "0")
          if [ "$CRITICAL" -gt "0" ]; then
            echo "::error::Frontend has ${CRITICAL} CRITICAL vulnerabilities. Pipeline blocked."
            exit 1
          fi

      - name: Scan for hardcoded secrets in source
        run: |
          echo "Scanning for hardcoded secrets / PHI patterns..."
          FOUND=0
          PATTERNS=(
            "password\s*=\s*['\"][^'\"]{4,}"
            "BEGIN RSA PRIVATE KEY"
            "BEGIN OPENSSH PRIVATE KEY"
            "api_key\s*=\s*['\"][^'\"]{8,}"
          )
          for PATTERN in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rniE "$PATTERN" \
              --include="*.js" --include="*.jsx" \
              --exclude-dir=node_modules --exclude-dir=dist \
              . 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::Potential secret found: $PATTERN"
              echo "$MATCHES"
              FOUND=$((FOUND + 1))
            fi
          done
          if [ "$FOUND" -gt "0" ]; then
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"

      - name: Check .gitignore covers .env files
        run: |
          if ! grep -q "^\.env" .gitignore 2>/dev/null; then
            echo "::warning::.gitignore may not be covering .env files"
          fi
          # Fail if .env is actually tracked by git
          if git ls-files --error-unmatch backend/.env 2>/dev/null; then
            echo "::error::backend/.env is tracked by git — HIPAA violation risk!"
            exit 1
          fi
          echo "✅ .env files are not git-tracked"

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports
          path: |
            /tmp/backend-audit.json
            /tmp/frontend-audit.json
          retention-days: 30

# =============================================================================
# JOB 5: Environment Validation
# Checks .env structure, forbidden values, secret strength
# =============================================================================
  env-check:
    name: "🔒 Env Validation"
    runs-on: ubuntu-latest
    needs: [setup]

    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run environment check (development mode for CI)
        run: |
          bash scripts/env-check.sh development
        env:
          CI: true

      - name: Validate .env.example completeness (backend)
        run: |
          echo "Checking backend .env.example has all required keys..."
          REQUIRED_KEYS=("NODE_ENV" "PORT" "JWT_SECRET" "HIPAA_MODE")
          for KEY in "${REQUIRED_KEYS[@]}"; do
            if ! grep -q "^${KEY}=" backend/.env.example; then
              echo "::error::backend/.env.example is missing required key: ${KEY}"
              exit 1
            fi
          done
          echo "✅ backend/.env.example is complete"

      - name: Validate .env.example completeness (frontend)
        run: |
          echo "Checking frontend .env.example has all required keys..."
          REQUIRED_KEYS=("VITE_API_URL" "VITE_APP_NAME" "VITE_APP_ENV")
          for KEY in "${REQUIRED_KEYS[@]}"; do
            if ! grep -q "^${KEY}=" frontend/.env.example; then
              echo "::error::frontend/.env.example is missing required key: ${KEY}"
              exit 1
            fi
          done
          echo "✅ frontend/.env.example is complete"

      - name: Production env forbidden-value check
        if: github.ref_name == 'main'
        run: |
          echo "Running production-level env checks on main branch..."
          bash scripts/env-check.sh production 2>&1 | grep -v "not found" || true

# =============================================================================
# JOB 6: Build
# Ensures frontend compiles without errors
# =============================================================================
  build:
    name: "🏗️ Build"
    runs-on: ubuntu-latest
    needs: [lint, security, env-check]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore frontend cache
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: frontend-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Create CI .env.local for frontend
        working-directory: frontend
        run: |
          cat > .env.local << EOF
          VITE_API_URL=http://localhost:${{ env.BACKEND_PORT }}
          VITE_APP_NAME=HealFlow
          VITE_APP_ENV=ci
          VITE_ENABLE_AUDIT_LOG=true
          VITE_ENABLE_HIPAA_BANNER=true
          EOF
          echo "✅ .env.local created for CI build"

      - name: Build frontend
        working-directory: frontend
        run: |
          echo "Building frontend with Vite..."
          npm run build 2>&1 | tee /tmp/build-output.txt
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::error::Frontend build failed"
            exit 1
          fi

      - name: Check build output size
        working-directory: frontend
        run: |
          BUILD_SIZE=$(du -sh dist/ 2>/dev/null | cut -f1 || echo "unknown")
          echo "### 🏗️ Build Output" >> $GITHUB_STEP_SUMMARY
          echo "- Build size: ${BUILD_SIZE}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ✅ Success" >> $GITHUB_STEP_SUMMARY

          # Warn if build is unexpectedly large (> 5MB)
          BUILD_BYTES=$(du -sb dist/ 2>/dev/null | cut -f1 || echo "0")
          if [ "$BUILD_BYTES" -gt "5242880" ]; then
            echo "::warning::Frontend build is larger than 5MB (${BUILD_SIZE}). Consider code splitting."
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

# =============================================================================
# JOB 7: Backend Health Check
# Starts Express server and validates the /health endpoint
# =============================================================================
  backend-check:
    name: "🏥 Backend Health"
    runs-on: ubuntu-latest
    needs: [lint, security, env-check]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore backend cache
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}

      - name: Create CI .env for backend
        working-directory: backend
        run: |
          cat > .env << EOF
          NODE_ENV=test
          PORT=${{ env.BACKEND_PORT }}
          ALLOWED_ORIGINS=http://localhost:5173
          JWT_SECRET=ci-test-jwt-secret-not-for-production-use-only
          JWT_EXPIRES_IN=1h
          RATE_LIMIT_WINDOW_MS=900000
          RATE_LIMIT_MAX=1000
          AUDIT_LOG_ENABLED=false
          HIPAA_MODE=false
          PHI_ENCRYPTION_KEY=ci-test-encryption-key-32-bytes!!
          DATA_RETENTION_DAYS=2555
          EOF

      - name: Start backend server
        working-directory: backend
        run: |
          node server.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait for server ready
          for i in $(seq 1 15); do
            if curl -sf http://localhost:${{ env.BACKEND_PORT }}/health > /dev/null 2>&1; then
              echo "✅ Server ready after ${i}s"
              break
            fi
            sleep 1
            if [ "$i" -eq "15" ]; then
              echo "::error::Backend server failed to start within 15s"
              exit 1
            fi
          done

      - name: Validate /health endpoint
        run: |
          RESPONSE=$(curl -sf http://localhost:${{ env.BACKEND_PORT }}/health)
          echo "Health response: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','fail'))" 2>/dev/null || echo "fail")
          if [ "$STATUS" != "ok" ]; then
            echo "::error::/health endpoint returned unexpected status: $STATUS"
            exit 1
          fi
          echo "✅ /health returned status: ok"

      - name: Check security headers on backend
        run: |
          HEADERS=$(curl -sI http://localhost:${{ env.BACKEND_PORT }}/health)
          REQUIRED_HEADERS=("x-content-type-options" "x-frame-options")
          for H in "${REQUIRED_HEADERS[@]}"; do
            if echo "$HEADERS" | grep -qi "$H"; then
              echo "✅ Security header present: $H"
            else
              echo "::warning::Security header missing: $H (ensure helmet is configured)"
            fi
          done

      - name: Stop backend server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true

# =============================================================================
# JOB 8: API Integration Check
# Full frontend ↔ backend integration: calls real endpoints, validates shapes
# =============================================================================
  api-integration:
    name: "🔗 API Integration"
    runs-on: ubuntu-latest
    needs: [backend-check]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore backend cache
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: backend-${{ runner.os }}-${{ hashFiles('backend/package-lock.json') }}

      - name: Create CI .env for backend
        working-directory: backend
        run: |
          cat > .env << EOF
          NODE_ENV=test
          PORT=${{ env.BACKEND_PORT }}
          ALLOWED_ORIGINS=http://localhost:5173
          JWT_SECRET=ci-test-jwt-secret-not-for-production-use-only
          JWT_EXPIRES_IN=1h
          RATE_LIMIT_WINDOW_MS=900000
          RATE_LIMIT_MAX=1000
          AUDIT_LOG_ENABLED=false
          HIPAA_MODE=false
          PHI_ENCRYPTION_KEY=ci-test-encryption-key-32-bytes!!
          DATA_RETENTION_DAYS=2555
          EOF

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Start backend and run all API checks
        run: bash scripts/health-check.sh ${{ env.BACKEND_PORT }}

      - name: Validate API response contracts
        run: |
          # Start server
          cd backend && node server.js &
          SERVER_PID=$!
          sleep 3

          echo "## API Contract Validation" >> $GITHUB_STEP_SUMMARY
          PASS=0; FAIL=0

          check() {
            local DESC="$1"
            local URL="$2"
            local JQ_CHECK="$3"
            RESP=$(curl -sf "$URL" 2>/dev/null || echo "{}")
            RESULT=$(echo "$RESP" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              # Evaluate simple key check
              keys = '$JQ_CHECK'.split('.')
              val = d
              for k in keys:
                  if k: val = val.get(k, None)
              print('PASS' if val is not None else 'FAIL')
          except: print('FAIL')
          " 2>/dev/null || echo "FAIL")

            if [ "$RESULT" = "PASS" ]; then
              echo "| ✅ | $DESC |" >> $GITHUB_STEP_SUMMARY
              PASS=$((PASS+1))
            else
              echo "| ❌ | $DESC |" >> $GITHUB_STEP_SUMMARY
              echo "::error::API contract failed: $DESC"
              FAIL=$((FAIL+1))
            fi
          }

          BASE="http://localhost:${{ env.BACKEND_PORT }}"
          TODAY=$(date +%Y-%m-%d)

          echo "| Status | Endpoint |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY

          check "GET /health → .status"                  "$BASE/health"                     "status"
          check "GET /api/patients → .success"           "$BASE/api/patients"               "success"
          check "GET /api/patients → .data is array"     "$BASE/api/patients"               "data"
          check "GET /api/patients → .total exists"      "$BASE/api/patients"               "total"
          check "GET /api/patients?status=active"        "$BASE/api/patients?status=active" "data"
          check "GET /api/patients?status=critical"      "$BASE/api/patients?status=critical" "total"
          check "GET /api/patients?search=chen"          "$BASE/api/patients?search=chen"   "total"
          check "GET /api/patients/p-001 → .data.mrn"   "$BASE/api/patients/p-001"         "data"
          check "GET /api/dashboard/summary"             "$BASE/api/dashboard/summary"      "data"
          check "GET /api/appointments?date=$TODAY"      "$BASE/api/appointments?date=$TODAY" "data"
          check "GET /api/labs"                          "$BASE/api/labs"                   "data"
          check "GET /api/labs?flagged=true"             "$BASE/api/labs?flagged=true"       "total"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Passed:** $PASS | **Failed:** $FAIL" >> $GITHUB_STEP_SUMMARY

          kill $SERVER_PID 2>/dev/null || true

          if [ "$FAIL" -gt "0" ]; then
            echo "::error::${FAIL} API contract check(s) failed"
            exit 1
          fi

# =============================================================================
# JOB 9: AI Suggestion Check
# Detects issues and outputs fix suggestions to pipeline summary
# =============================================================================
  ai-check:
    name: "🤖 AI Suggestions"
    runs-on: ubuntu-latest
    needs: [setup]
    continue-on-error: true  # AI check is advisory, never blocks pipeline

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            backend/node_modules
            frontend/node_modules
          key: all-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            backend-${{ runner.os }}-
            frontend-${{ runner.os }}-

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run AI suggestion engine
        id: ai
        run: bash scripts/ai-check.sh false

      - name: Upload AI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-devsecops-report
          path: /tmp/healflow-ai-report.md
          retention-days: 30

      - name: Post AI report to step summary
        if: always()
        run: |
          echo "## 🤖 AI DevSecOps Report" >> $GITHUB_STEP_SUMMARY
          cat /tmp/healflow-ai-report.md >> $GITHUB_STEP_SUMMARY || true

      - name: Create GitHub Issue if critical issues found
        if: |
          github.ref_name == 'main' &&
          steps.ai.outputs.issues_found != '0' &&
          github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUES="${{ steps.ai.outputs.issues_found }}"
          if [ "$ISSUES" -gt "0" ]; then
            gh issue create \
              --title "🔐 DevSecOps: ${ISSUES} issue(s) detected on main [$(date +%Y-%m-%d)]" \
              --body-file /tmp/healflow-ai-report.md \
              --label "security" \
              2>/dev/null || echo "Note: Could not create issue (may require 'issues: write' permission)"
          fi

# =============================================================================
# JOB 10: Deployment Readiness Gate
# Only passes if ALL required jobs succeed — final gate before deploy
# =============================================================================
  deployment-ready:
    name: "✅ Deployment Gate"
    runs-on: ubuntu-latest
    needs:
      - branch-check
      - lint
      - security
      - env-check
      - build
      - backend-check
      - api-integration

    steps:
      - name: All checks passed
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║         ✅  ALL CHECKS PASSED — BUILD IS CLEAN          ║"
          echo "║                                                          ║"
          echo "║  • Branch policy   ✅                                    ║"
          echo "║  • Lint            ✅                                    ║"
          echo "║  • Security audit  ✅                                    ║"
          echo "║  • Env validation  ✅                                    ║"
          echo "║  • Frontend build  ✅                                    ║"
          echo "║  • Backend health  ✅                                    ║"
          echo "║  • API integration ✅                                    ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""

      - name: Write deployment summary
        run: |
          echo "## ✅ Deployment Gate Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch Policy | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality (Lint) | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment Validation | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Health | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          echo "| API Integration | ✅ Pass |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Deploy eligible:** \`${{ needs.branch-check.outputs.can_deploy }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Set deployment output
        id: ready
        run: echo "ready=true" >> $GITHUB_OUTPUT

# =============================================================================
# JOB 11: Deploy Frontend → Vercel
# Only runs on main or release/* branches after gate passes
# =============================================================================
  deploy-frontend:
    name: "🚀 Deploy Frontend"
    runs-on: ubuntu-latest
    needs: [deployment-ready, branch-check]
    if: |
      needs.deployment-ready.result == 'success' &&
      needs.branch-check.outputs.can_deploy == 'true'

    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: ${{ steps.deploy.outputs.preview-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: ${{ github.ref_name == 'main' && '--prod' || '' }}

      - name: Announce deployment
        run: |
          echo "## 🚀 Frontend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ steps.deploy.outputs.preview-url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# JOB 12: Deploy Backend → Railway
# Only runs on main or release/* branches after gate passes
# =============================================================================
  deploy-backend:
    name: "🚀 Deploy Backend"
    runs-on: ubuntu-latest
    needs: [deployment-ready, branch-check]
    if: |
      needs.deployment-ready.result == 'success' &&
      needs.branch-check.outputs.can_deploy == 'true'

    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service healflow-backend --detach
        continue-on-error: false

      - name: Verify backend deployment
        run: |
          echo "Waiting for Railway deployment to be live..."
          sleep 20
          BACKEND_URL="${{ secrets.RAILWAY_BACKEND_URL }}"
          if [ -n "$BACKEND_URL" ]; then
            STATUS=$(curl -sf "${BACKEND_URL}/health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','fail'))" 2>/dev/null || echo "unreachable")
            if [ "$STATUS" = "ok" ]; then
              echo "✅ Backend is live at ${BACKEND_URL}"
            else
              echo "::warning::Backend health check returned: ${STATUS}"
            fi
          fi

      - name: Deployment summary
        run: |
          echo "## 🚀 Backend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- Service: Railway" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}" >> $GITHUB_STEP_SUMMARY